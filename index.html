<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>MK IPTV Lite Pro - M3U Player with VLC Mode</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/video.js@8.10.0/dist/video-js.min.css" rel="stylesheet">
  
  <!-- AD SLOT 1: HEADER BANNER -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
</head>
<body>
  <!-- AD SLOT 1: TOP BANNER -->
  <div class="ad-banner ad-top">
    <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXXXXXXXXXXXXXX" data-ad-slot="1111111111" data-ad-format="auto"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  </div>

  <header class="header">
    <div class="container">
      <div class="logo"><i class="fa-solid fa-tv"></i> MK<span>IPTV</span> LITE</div>
      <div class="header-stats">
        <span><i class="fa-solid fa-list"></i> <b id="totalChannels">0</b> Channels</span>
        <span><i class="fa-solid fa-bolt"></i> Lite Mode</span>
      </div>
      <div class="header-actions">
        <button class="btn-icon" onclick="toggleProxy()" id="proxyBtn" title="CORS Proxy">
          <i class="fa-solid fa-shield-halved"></i> <span id="proxyStatus">OFF</span>
        </button>
        <button class="btn-icon" onclick="showAddPlaylist()"><i class="fa-solid fa-plus"></i> Add M3U</button>
      </div>
    </div>
  </header>

  <div class="app-layout">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="search-box">
          <i class="fa-solid fa-search"></i>
          <input type="text" id="searchChannel" placeholder="Search 50k+ channels..." oninput="debouncedSearch()">
        </div>
      </div>
      
      <!-- AD SLOT 2: SIDEBAR -->
      <div class="ad-sidebar">
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXXXXXXXXXXXXXX" data-ad-slot="2222222222" data-ad-format="auto"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
      </div>
      
      <div class="playlist-tabs" id="playlistTabs"></div>

      <div class="channels-list" id="channelsList">
        <div class="loading-state">
          <i class="fa-solid fa-spinner fa-spin"></i>
          <p>Loading default playlist...</p>
        </div>
      </div>
      
      <div class="pagination" id="pagination" style="display:none">
        <button onclick="prevPage()"><i class="fa-solid fa-chevron-left"></i></button>
        <span>Page <b id="currentPage">1</b> / <b id="totalPages">1</b></span>
        <button onclick="nextPage()"><i class="fa-solid fa-chevron-right"></i></button>
      </div>
    </aside>

    <!-- PLAYER SECTION -->
    <main class="player-section">
      <!-- AD SLOT 3: PRE-ROLL -->
      <div class="ad-preroll" id="adPreroll" style="display:none">
        <div class="ad-label">Advertisement</div>
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXXXXXXXXXXXXXX" data-ad-slot="3333333333" data-ad-format="auto"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        <button class="btn-skip" onclick="skipAd()">Skip Ad <span id="adCountdown">5</span></button>
      </div>

      <div class="player-wrapper">
        <div class="player-container">
          <video id="videoPlayer" class="video-js vjs-default-skin" controls preload="none"></video>
          <canvas id="vlcCanvas" style="display:none;width:100%;height:100%"></canvas>
          
          <div class="player-overlay" id="playerOverlay">
            <div class="overlay-content">
              <i class="fa-solid fa-satellite-dish"></i>
              <h3>MK IPTV Lite Pro</h3>
              <p>Loading default channels...</p>
            </div>
          </div>
        </div>

        <div class="player-controls">
          <div class="control-left">
            <div class="channel-info" id="channelInfo" style="display:none">
              <img id="channelLogo" src="" alt="">
              <div>
                <div class="channel-name" id="channelName">-</div>
                <div class="channel-status" id="channelStatus"><i class="fa-solid fa-circle"></i> Ready</div>
              </div>
            </div>
          </div>
          
          <div class="control-right">
            <div class="control-group">
              <label><i class="fa-solid fa-volume-high"></i> Audio</label>
              <select id="audioTrack" onchange="changeAudioTrack()">
                <option value="-1">Auto</option>
              </select>
            </div>
            
            <div class="control-group">
              <label><i class="fa-solid fa-display"></i> Player</label>
              <select id="playerMode" onchange="changePlayerMode()">
                <option value="browser">Browser HLS</option>
                <option value="vlc-like">VLC Mode [BEST]</option>
                <option value="external">External VLC</option>
              </select>
            </div>

            <button class="btn-vlc" onclick="openInVLCExternal()" id="vlcBtn">
              <i class="fa-solid fa-arrow-up-right-from-square"></i> Open in VLC
            </button>
          </div>
        </div>

        <div class="info-bar" id="infoBar">
          <div class="info-item">
            <i class="fa-solid fa-signal"></i>
            <span>Quality: <b id="videoQuality">Auto</b></span>
          </div>
          <div class="info-item">
            <i class="fa-solid fa-gauge"></i>
            <span>Buffer: <b id="bufferHealth">-</b></span>
          </div>
          <div class="info-item">
            <i class="fa-solid fa-server"></i>
            <span>Proxy: <b id="proxyInfo">OFF</b></span>
          </div>
          <div class="info-item">
            <i class="fa-solid fa-microchip"></i>
            <span>Mode: <b id="liteMode">LITE</b></span>
          </div>
        </div>
      </div>

      <!-- AD SLOT 4: BETWEEN CONTENT -->
      <div class="ad-incontent">
        <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXXXXXXXXXXXXXX" data-ad-slot="4444444444" data-ad-format="auto"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
      </div>

      <div class="recent-section">
        <h3><i class="fa-solid fa-clock-rotate-left"></i> Recently Watched</h3>
        <div id="recentChannels" class="recent-grid"></div>
      </div>
    </main>
  </div>

  <!-- AD SLOT 5: FOOTER -->
  <div class="ad-footer">
    <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-XXXXXXXXXXXXXXXX" data-ad-slot="5555555555" data-ad-format="auto"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
  </div>

  <!-- MODALS: Same as before - Add Playlist -->
  <div id="addPlaylistModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Add M3U Playlist</h3>
        <button onclick="closeModal('addPlaylistModal')"><i class="fa-solid fa-x"></i></button>
      </div>
      <div class="modal-body">
        <label>Playlist Name</label>
        <input type="text" id="playlistName" placeholder="My IPTV">
        <label>M3U URL</label>
        <input type="url" id="playlistUrl" placeholder="https://example.com/playlist.m3u">
        <div class="tip-box">
          <i class="fa-solid fa-lightbulb"></i> 
          <b>LITE TIP:</b> Large playlists auto-paginate. 50,000+ channels supported.
        </div>
        <button class="btn-primary" onclick="addPlaylistByUrl()" style="width:100%;margin-top:20px">
          <i class="fa-solid fa-plus"></i> Add Playlist
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/video.js@8.10.0/dist/video.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@videojs/http-streaming@3.10.0/dist/videojs-http-streaming.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
